# CI-vangnet: elke push naar main en elke PR wordt getypecheckt en getest,
# zodat build-fouten hier stranden in plaats van pas bij de Render-deploy.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Zelfde major als Render (24.x) zodat CI en deploy hetzelfde gedrag zien.
          node-version: 24
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Typecheck (next typegen + tsc)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test
