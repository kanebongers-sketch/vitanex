<svg width="900" height="640" viewBox="0 0 900 640" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <radialGradient id="nGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="nBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- synaps-verbindingen -->
  <g stroke="url(#nLine)" stroke-width="1.4">
    <path d="M120 110 L300 220 L520 150 L720 260"/>
    <path d="M300 220 L260 420 L480 460 L700 380"/>
    <path d="M520 150 L480 460"/>
    <path d="M260 420 L120 540 L380 560"/>
    <path d="M700 380 L820 520 L600 600"/>
    <path d="M120 110 L260 420"/>
    <path d="M720 260 L700 380"/>
    <path d="M380 560 L600 600"/>
    <path d="M300 220 L520 150"/>
  </g>

  <!-- knooppunten -->
  <g fill="#00E5FF">
    <circle cx="120" cy="110" r="80" fill="url(#nGlow)" opacity="0.5"/>
    <circle cx="520" cy="150" r="90" fill="url(#nGlow)" opacity="0.45"/>
    <circle cx="700" cy="380" r="100" fill="url(#nGlow)" opacity="0.4"/>
    <circle cx="380" cy="560" r="80" fill="url(#nGlow)" opacity="0.4"/>

    <circle cx="120" cy="110" r="4.5"/>
    <circle cx="300" cy="220" r="6"/>
    <circle cx="520" cy="150" r="4.5"/>
    <circle cx="720" cy="260" r="3.5"/>
    <circle cx="260" cy="420" r="5.5"/>
    <circle cx="480" cy="460" r="4"/>
    <circle cx="700" cy="380" r="6"/>
    <circle cx="120" cy="540" r="3.5"/>
    <circle cx="380" cy="560" r="5"/>
    <circle cx="820" cy="520" r="4"/>
    <circle cx="600" cy="600" r="4.5"/>
  </g>
</svg>
