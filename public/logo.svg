    fill="none"
    stroke="white"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- F: horizontale balken -->
  <line x1="26" y1="10" x2="44" y2="10" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="26" y1="22" x2="38" y2="22" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
</svg>
